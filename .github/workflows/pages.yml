name: Deploy report to GitHub Pages

# Publishes output/report.html as the GitHub Pages site (served as index.html).
# The report is self-contained (charts embedded as base64), so no other assets
# are needed. Runs on every push to main, or manually.

on:
  push:
    branches: [main]
    paths:
      - output/report.html
      - .github/workflows/pages.yml
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; newer pushes supersede in-progress runs.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Assemble site
        run: |
          mkdir -p _site
          cp output/report.html _site/index.html

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          # Enable GitHub Pages (Actions source) on first run if not already on.
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
